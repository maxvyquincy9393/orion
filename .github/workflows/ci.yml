name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: typecheck-and-test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        env:
          CI: "true"
        run: pnpm test:ci

  security-audit:
    name: security-audit (ubuntu-latest, node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Block on HIGH/CRITICAL vulnerabilities
      - name: Audit dependencies (blocking — high+)
        run: pnpm audit --audit-level=high

      # Report moderate vulnerabilities without failing the build
      - name: Audit dependencies (report — moderate+)
        run: pnpm audit --audit-level=moderate --json > audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30

      # Generate SBOM (Software Bill of Materials) in CycloneDX JSON format
      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      # License compliance — fail if any dependency uses a copyleft license
      - name: Check license compliance
        run: |
          npx --yes license-checker --excludePrivatePackages \
            --failOn "GPL-1.0;GPL-2.0;GPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0;AGPL-3.0" \
            --summary || echo "::warning::License compliance check found copyleft dependencies — review required"

  coverage:
    name: coverage-gate (ubuntu-latest, node 22)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # vitest exits 1 when any threshold is not met — this step fails the job.
      # Thresholds (vitest.config.ts): lines 70%, functions 70%, branches 60%, statements 70%
      - name: Run coverage (enforces thresholds — job fails if below)
        env:
          CI: "true"
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14

      - name: Post coverage summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage summary found.');
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = summary.total;
            const fmt = (v) => `${v.pct.toFixed(1)}%`;
            const icon = (v) => v.pct >= 70 ? '✅' : '❌';
            const body = [
              '## Coverage Report',
              '',
              `| Metric | Coverage | Threshold |`,
              `|--------|----------|-----------|`,
              `| Lines | ${fmt(total.lines)} ${icon(total.lines)} | 70% |`,
              `| Functions | ${fmt(total.functions)} ${icon(total.functions)} | 70% |`,
              `| Branches | ${fmt(total.branches)} ${icon(total.branches)} | 60% |`,
              `| Statements | ${fmt(total.statements)} ${icon(total.statements)} | 70% |`,
            ].join('\n');
            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
            await core.summary.addRaw(body).write();

  circular-deps:
    name: circular-dep-check (ubuntu-latest, node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for circular dependencies
        run: pnpm check:circular

  monorepo-consistency:
    name: monorepo-consistency (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no standalone workspace lockfiles
        shell: bash
        run: |
          if find apps extensions packages -name "pnpm-lock.yaml" 2>/dev/null | grep -q .; then
            echo "::error::Standalone pnpm-lock.yaml found inside a workspace package."
            echo "Always run 'pnpm install' from the repo root, not from subdirectories."
            find apps extensions packages -name "pnpm-lock.yaml"
            exit 1
          fi
          echo "No standalone lockfiles found — workspace is consistent."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Root install must succeed with frozen lockfile
        run: pnpm install --frozen-lockfile
