name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/edith:${{ github.sha }}
            ghcr.io/${{ github.repository }}/edith:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io staging
        run: flyctl deploy --image ghcr.io/${{ github.repository }}/edith:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 https://edith-staging.fly.dev/health \
            || (echo "Health check failed" && exit 1)

  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: k8s-production
    # Only run when KUBECONFIG secret is set
    if: vars.K8S_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade / install
        run: |
          helm upgrade --install edith ./k8s/helm \
            -f k8s/helm/values.prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set image.repository=ghcr.io/${{ github.repository }}/edith \
            --namespace edith \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/edith -n edith --timeout=3m
