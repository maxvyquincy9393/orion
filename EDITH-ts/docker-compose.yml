services:
  edith:
    build: .
    ports:
      - "18789:18789"
      - "8080:8080"
    volumes:
      - edith_data:/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  edith_data:
